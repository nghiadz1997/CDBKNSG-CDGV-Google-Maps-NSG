<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nam Sài Gòn Navigator - Hệ thống Định vị</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Leaflet & Routing -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f1f5f9; }
        
        #map { height: 100%; width: 100%; min-height: 400px; background: #e5e7eb; }
        
        .map-container {
            height: 50vh;
            width: 100%;
        }

        @media (min-width: 1024px) {
            .map-container { height: 100vh; }
        }

        .leaflet-routing-container { display: none !important; }
        
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        .btn-primary {
            background: linear-gradient(135deg, #1d4ed8 0%, #2563eb 100%);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-primary:active { transform: scale(0.96); }

        .image-gallery {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding: 4px 0 12px 0;
            scroll-snap-type: x mandatory;
        }
        .image-gallery img {
            flex: 0 0 90%;
            scroll-snap-align: start;
            height: 220px;
            object-fit: cover;
            border-radius: 1.5rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .badge-classroom { background: #e0f2fe; color: #0369a1; border: 1px solid #bae6fd; }
        .badge-faculty { background: #fef2f2; color: #b91c1c; border: 1px solid #fecaca; }
        .badge-admin { background: #f0fdf4; color: #15803d; border: 1px solid #bbf7d0; }
        .badge-func { background: #fdf4ff; color: #7e22ce; border: 1px solid #f5d0fe; }
        .badge-rector { background: #0f172a; color: #ffffff; border: 1px solid #334155; }

        .custom-marker-icon { background: none !important; border: none !important; }
        .marker-wrapper { display: flex; flex-direction: column; align-items: center; }
        .marker-icon-box {
            width: 38px; height: 38px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            color: white; border: 2.5px solid white;
            box-shadow: 0 8px 15px -3px rgba(0, 0, 0, 0.3);
        }
        .marker-label {
            background: rgba(255, 255, 255, 0.95); color: #1e293b;
            padding: 2px 8px; border-radius: 8px;
            font-size: 9px; font-weight: 800; margin-top: 4px;
            white-space: nowrap; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border: 1px solid #e2e8f0;
        }
        .box-rector { background: #0f172a; }
        .label-rector { background: #0f172a; color: white; border-color: #334155; }
        .room-dot {
            width: 14px; height: 14px; border-radius: 50%;
            border: 2px solid white; box-shadow: 0 0 8px rgba(0,0,0,0.4);
        }
        .admin-active-map { cursor: crosshair !important; }
        .profile-popup { min-width: 220px; }

        .speaking {
            animation: pulse-blue 1.5s infinite;
            background: #dbeafe !important;
        }
        @keyframes pulse-blue {
            0% { box-shadow: 0 0 0 0 rgba(37, 99, 235, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(37, 99, 235, 0); }
            100% { box-shadow: 0 0 0 0 rgba(37, 99, 235, 0); }
        }

        /* Styling for Optgroups to make them stand out */
        select optgroup {
            font-style: normal;
            font-weight: 800;
            color: #1d4ed8;
            background: #f8fafc;
            padding: 10px;
        }
        select option {
            font-weight: 600;
            color: #334155;
            padding: 8px;
            background: white;
        }
    </style>
</head>
<body class="overflow-x-hidden antialiased text-slate-900">

<div id="app" class="flex flex-col lg:flex-row min-h-screen relative">
    
    <!-- SIDEBAR -->
    <aside class="w-full lg:w-[420px] xl:w-[480px] flex flex-col z-20 shadow-[0_-10px_40px_rgba(0,0,0,0.1)] lg:shadow-2xl bg-white lg:h-screen overflow-hidden order-2 lg:order-1 border-t lg:border-t-0 lg:border-r border-slate-200 rounded-t-[2.5rem] lg:rounded-t-none -mt-10 lg:mt-0">
        <header class="p-5 lg:p-6 bg-blue-700 text-white flex justify-between items-center shrink-0 shadow-lg">
            <div>
                <h1 class="text-xl font-extrabold tracking-tighter leading-none uppercase">Navigator NSG</h1>
                <p class="text-[10px] opacity-70 uppercase tracking-[0.2em] font-bold mt-1">CĐBK Nam Sài Gòn</p>
            </div>
            <button onclick="ui.toggleAdminLogin()" class="w-10 h-10 bg-white/10 hover:bg-white/20 rounded-2xl flex items-center justify-center transition-all">

        </header>

        <div class="flex-1 overflow-y-auto custom-scrollbar">
            <div id="user-view" class="p-5 lg:p-6 space-y-6">
                <div class="space-y-4">
                    <div class="relative">
                        <label class="block text-[10px] font-black text-slate-400 uppercase mb-2 tracking-widest ml-1">Tìm kiếm phòng ban / vị trí</label>
                        <div class="relative group">
                            <select id="destination" onchange="logic.selectLocation(this.value)" class="w-full p-4 pl-12 border-2 border-slate-100 rounded-2xl focus:border-blue-500 outline-none bg-slate-50 text-slate-800 font-bold appearance-none cursor-pointer transition-all shadow-sm">
                                <option value="">-- Bạn muốn đi đâu? --</option>
                            </select>
                            <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-blue-500"></i>
                        </div>
                    </div>

                    <div id="welcome-panel" class="py-4">
                        <div class="bg-blue-50 rounded-[2rem] p-6 border border-blue-100 text-center">
                            <div class="w-16 h-16 bg-white rounded-2xl shadow-md flex items-center justify-center mx-auto mb-4">
                                <i class="fas fa-map-marked-alt text-2xl text-blue-600"></i>
                            </div>
                            <h2 class="text-lg font-extrabold text-blue-900 tracking-tight">Hệ thống dẫn đường</h2>
                            <p class="text-sm text-blue-700/70 mt-2 font-medium italic">Vui lòng chọn địa điểm phía trên để bắt đầu.</p>
                        </div>

                    <div id="navigation-panel" class="hidden space-y-5 animate-in fade-in slide-in-from-bottom-4 duration-500 pb-10">
                        <div id="room-type-info" class="flex flex-wrap gap-2"></div>

                            <div class="flex items-center gap-4">
                                <div class="w-12 h-12 bg-white/20 backdrop-blur-md rounded-2xl flex items-center justify-center">
                                    <i class="fas fa-walking text-xl"></i>

                                <div>

                                </div>

                        <div id="office-contact-card" class="hidden bg-white border-2 border-slate-50 rounded-[2.5rem] p-6 shadow-sm">
                            <h3 class="text-xs font-black text-slate-400 uppercase tracking-widest mb-5">Thông tin nhân sự</h3>
                            <div class="space-y-4">
                                <div class="flex items-start gap-4">
                                    <div class="w-10 h-10 rounded-2xl bg-blue-50 flex items-center justify-center shrink-0"><i class="fas fa-user-tie text-blue-600"></i></div>
                                    <div>
                                        <p id="head-title-label" class="text-[10px] font-bold text-slate-400 uppercase">Trưởng đơn vị</p>
                                        <p id="head-name" class="text-base font-extrabold text-slate-800"></p>
                                    </div>

                                <div id="deputy-container" class="flex items-start gap-4">
                                    <div class="w-10 h-10 rounded-2xl bg-blue-50 flex items-center justify-center shrink-0"><i class="fas fa-user-friends text-blue-600"></i></div>
                                    <div>
                                        <p id="deputy-title-label" class="text-[10px] font-bold text-slate-400 uppercase">Cấp phó</p>
                                        <p id="deputy-name" class="text-base font-extrabold text-slate-800"></p>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div id="image-gallery-container" class="hidden bg-slate-50 rounded-[2.5rem] p-6">
                            <h3 class="font-bold text-[10px] text-slate-400 uppercase mb-4">Hình ảnh thực tế</h3>
                            <div id="image-gallery" class="image-gallery"></div>
                        </div>

                        <div class="bg-white border border-slate-100 rounded-[2.5rem] p-6 shadow-sm">
                            <div class="flex justify-between items-center mb-4">
                                <h3 class="font-bold text-[10px] text-slate-400 uppercase tracking-wider flex items-center gap-2">

                                <button id="voice-btn" onclick="logic.toggleVoice()" class="w-10 h-10 rounded-2xl bg-blue-50 text-blue-600 flex items-center justify-center hover:bg-blue-100 transition-all">

                    </div>

            </div>

            <!-- ADMIN PANEL -->
            <div id="admin-panel" class="hidden p-5 lg:p-6 space-y-6 bg-slate-50/50 min-h-full">

                    <h2 class="text-lg font-black text-blue-600 uppercase tracking-tighter">Admin Mode</h2>
                    <button onclick="ui.logout()" class="text-[10px] font-black text-red-500 bg-red-100 px-4 py-2 rounded-xl uppercase">Đăng xuất</button>
                </div>
                <form id="location-form" onsubmit="logic.handleSaveLocation(event)" class="space-y-4 pb-20">
                    <input type="hidden" id="form-id">

                            <select id="form-area" required class="p-4 border-2 border-slate-100 rounded-2xl bg-slate-50 font-bold">
                                <option value="A">Khu A</option><option value="B">Khu B</option><option value="C">Khu C</option><option value="D">Khu D</option><option value="Khác">Khác</option>
                            </select>
                            <select id="form-floor" required class="p-4 border-2 border-slate-100 rounded-2xl bg-slate-50 font-bold">
                                <option value="Trệt">Trệt</option><option value="1">Lầu 1</option><option value="2">Lầu 2</option><option value="3">Lầu 3</option><option value="4">Lầu 4</option>
                            </select>
                        </div>
                        <select id="form-type" required class="w-full p-4 border-2 border-slate-100 rounded-2xl bg-slate-50 font-bold">
                            <option value="phong-hoc">Phòng học</option>
                            <option value="hieu-truong">Hiệu Trưởng</option>
                            <option value="pho-hieu-truong">Phó Hiệu Trưởng</option>
                            <option value="vp-khoa">Văn phòng Khoa</option>
                            <option value="hanh-chinh">Hành chính</option>
                            <option value="phong-chuc-nang">Phòng chức năng</option>
                        </select>
                        <div class="grid grid-cols-2 gap-4 text-xs bg-amber-50 p-4 rounded-2xl border border-amber-100">
                            <input type="number" step="any" id="form-lat" required class="bg-transparent font-bold outline-none" placeholder="Vĩ độ">
                            <input type="number" step="any" id="form-lng" required class="bg-transparent font-bold outline-none" placeholder="Kinh độ">
                        </div>
                        <input type="text" id="form-head" class="w-full p-4 border-2 border-slate-100 rounded-2xl bg-slate-50" placeholder="Người phụ trách">
                        <input type="text" id="form-deputy" class="w-full p-4 border-2 border-slate-100 rounded-2xl bg-slate-50" placeholder="Cấp phó">
                        <textarea id="form-note" class="w-full p-4 border-2 border-slate-100 rounded-2xl bg-slate-50 h-28" placeholder="Hướng dẫn di chuyển..."></textarea>
                        <textarea id="form-images" class="w-full p-4 border-2 border-slate-100 rounded-2xl bg-slate-50" placeholder="Link ảnh (cách nhau dấu phẩy)"></textarea>
                    </div>
                    <button type="submit" class="w-full btn-primary text-white font-black py-5 rounded-2xl shadow-xl uppercase">Lưu dữ liệu</button>
                    <button type="button" onclick="logic.resetForm()" class="w-full text-slate-400 font-bold text-xs uppercase py-2">Reset Form</button>
                </form>
                <div id="admin-list" class="space-y-3 pb-20"></div>

        </div>
    </aside>

    <!-- MAP INTERFACE -->
    <main class="flex-1 map-container order-1 lg:order-2 sticky top-0 overflow-hidden">
        <div id="map"></div>
        <div class="absolute top-6 right-6 z-[1000] flex flex-col gap-3">
            <button onclick="ui.toggleLayer()" class="bg-white/90 backdrop-blur-md p-4 rounded-2xl shadow-2xl border border-white text-blue-600 flex items-center justify-center">

            </button>
            <button onclick="logic.recenter()" class="bg-white/90 backdrop-blur-md p-4 rounded-2xl shadow-2xl border border-white text-slate-600 flex items-center justify-center">

    <!-- LOGIN MODAL -->
    <div id="login-modal" class="fixed inset-0 z-[100] bg-slate-900/70 flex items-center justify-center p-4 hidden backdrop-blur-sm animate-in fade-in duration-300">

            <div class="text-center mb-10">
                <div class="w-20 h-20 bg-blue-50 text-blue-600 rounded-[2rem] flex items-center justify-center mx-auto mb-5">
                    <i class="fas fa-lock text-3xl"></i>

                <h2 class="text-2xl font-black text-slate-800 tracking-tight">Admin Access</h2>
            </div>
            <div class="space-y-4">
                <input type="text" id="admin-user" class="w-full p-4 border-2 border-slate-100 rounded-2xl bg-slate-50 text-center font-bold" placeholder="Username">
                <input type="password" id="admin-pass" class="w-full p-4 border-2 border-slate-100 rounded-2xl bg-slate-50 text-center font-bold" placeholder="Password">
                <button onclick="ui.login()" class="w-full btn-primary text-white font-black py-4 rounded-2xl shadow-xl mt-4 uppercase">Đăng nhập</button>
                <button onclick="ui.toggleAdminLogin()" class="w-full text-slate-400 font-bold text-[10px] uppercase py-2 tracking-widest mt-2">Hủy bỏ</button>
            </div>
        </div>
    </div>

</div>

<!-- Firebase & Logic -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
    import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";
    import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDi5gsOdE9tGOR6JQzMgw_9QscD-XBRNwk",
        authDomain: "alook-26a1f.firebaseapp.com",
        projectId: "alook-26a1f",
        storageBucket: "alook-26a1f.appspot.com",
        messagingSenderId: "201575321450",
        appId: "1:201575321450:web:3f00cdd591af0d5e52df13"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const appId = 'nsg-navigator-v6'; 

    let map, routingControl, googleSatellite, googleRoadmap;
    let locationMarkersGroup = L.layerGroup(); 
    let isSatellite = true;
    let isAdmin = false;
    let isSpeaking = false;
    let locations = [];
    const schoolGate = [10.735473, 106.680579];

    const safeSetText = (id, val) => {
        const el = document.getElementById(id);
        if (el) el.innerText = val || "";
    };

    window.ui = {
        toggleLayer: () => {
            isSatellite = !isSatellite;
            if (isSatellite) {
                map.removeLayer(googleRoadmap); googleSatellite.addTo(map);
                document.getElementById('layer-icon').className = "fas fa-satellite";
            } else {
                map.removeLayer(googleSatellite); googleRoadmap.addTo(map);
                document.getElementById('layer-icon').className = "fas fa-layer-group";
            }
        },
        toggleAdminLogin: () => {
            if (isAdmin) ui.logout();
            else document.getElementById('login-modal').classList.remove('hidden');
        },
        login: () => {
            const u = document.getElementById('admin-user').value;
            const p = document.getElementById('admin-pass').value;
            if (u === 'admin' && p === 'Nsg@2026') {
                isAdmin = true;
                document.getElementById('login-modal').classList.add('hidden');
                document.getElementById('user-view').classList.add('hidden');
                document.getElementById('admin-panel').classList.remove('hidden');
                document.getElementById('admin-icon').className = "fas fa-sign-out-alt";
                document.getElementById('map').classList.add('admin-active-map');
                logic.updateMapMarkers(); 
            } else { alert("Sai thông tin đăng nhập!"); }
        },
        logout: () => {
            isAdmin = false;
            document.getElementById('admin-panel').classList.add('hidden');
            document.getElementById('user-view').classList.remove('hidden');
            document.getElementById('admin-icon').className = "fas fa-user-shield";
            document.getElementById('map').classList.remove('admin-active-map');
            locationMarkersGroup.clearLayers(); 
        }
    };

    window.logic = {
        init: async () => {
            googleSatellite = L.tileLayer('https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', { maxZoom: 22 });
            googleRoadmap = L.tileLayer('https://mt1.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', { maxZoom: 22 });

            map = L.map('map', { zoomControl: false, attributionControl: false }).setView(schoolGate, 19);
            googleSatellite.addTo(map);

            setTimeout(() => { map.invalidateSize(); }, 500);

            L.marker(schoolGate, {
                icon: L.divIcon({
                    className: 'custom-marker-icon',
                    html: `<div class="marker-wrapper"><div class="marker-icon-box bg-red-600"><i class="fas fa-door-open"></i></div><div class="marker-label">CỔNG CAO LỖ</div></div>`,
                    iconSize: [40, 65], iconAnchor: [20, 50]
                })
            }).addTo(map).bindPopup("<div class='font-bold text-center'>Cổng chính (47 Cao Lỗ)</div>");
            
            locationMarkersGroup.addTo(map);

            map.on('click', (e) => {
                if (isAdmin) {
                    document.getElementById('form-lat').value = e.latlng.lat.toFixed(7);
                    document.getElementById('form-lng').value = e.latlng.lng.toFixed(7);
                }
            });

            await signInAnonymously(auth);
            logic.listenToFirestore();

            window.speechSynthesis.getVoices();
            if (speechSynthesis.onvoiceschanged !== undefined) {
                speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
            }
        },

        recenter: () => map.flyTo(schoolGate, 19),

        formatImageLink: (url) => {
            if (!url) return "";
            url = url.trim();
            const driveMatch = url.match(/drive\.google\.com\/file\/d\/([^\/]+)/) || url.match(/drive\.google\.com\/open\?id=([^\&]+)/);
            if (driveMatch) return `https://drive.google.com/uc?export=view&id=${driveMatch[1]}`;
            return url;
        },

        toggleVoice: (autoText = null) => {
            if (window.speechSynthesis.speaking) {
                window.speechSynthesis.cancel();
                if (isSpeaking && !autoText) {
                    isSpeaking = false;
                    const btn = document.getElementById('voice-btn');
                    if (btn) {
                        btn.classList.remove('speaking');
                        btn.innerHTML = '<i class="fas fa-volume-up"></i>';
                    }
                    return;
                }
            }

            const steps = document.querySelectorAll('#step-list p');
            if (steps.length === 0 && !autoText) return;

            let fullText = autoText || "Hướng dẫn di chuyển. ";
            if (!autoText) {
                steps.forEach((p, index) => {
                    fullText += `Bước ${index + 1}: ${p.innerText}. `;
                });
            }

            const utterance = new SpeechSynthesisUtterance(fullText);
            const voices = window.speechSynthesis.getVoices();

            let vietnameseVoice =
                voices.find(v => v.lang.toLowerCase().includes('vi')) ||   
                voices.find(v => v.name.toLowerCase().includes('vi')) ||   
                voices[0]; 

            if (vietnameseVoice) {
                utterance.voice = vietnameseVoice;
            }

            utterance.lang = 'vi-VN';
            utterance.rate = 1.05;   
            utterance.pitch = 1;

            utterance.onstart = () => {
                isSpeaking = true;
                const btn = document.getElementById('voice-btn');
                if (btn) {
                    btn.classList.add('speaking');
                    btn.innerHTML = '<i class="fas fa-stop text-red-500"></i>';
                }
            };

            utterance.onend = () => {
                isSpeaking = false;
                const btn = document.getElementById('voice-btn');
                if (btn) {
                    btn.classList.remove('speaking');
                    btn.innerHTML = '<i class="fas fa-volume-up"></i>';
                }
            };

            utterance.onerror = () => {
                isSpeaking = false;
                const btn = document.getElementById('voice-btn');
                if (btn) {
                    btn.classList.remove('speaking');
                    btn.innerHTML = '<i class="fas fa-volume-up"></i>';
                }
            };

            window.speechSynthesis.speak(utterance);
        },

        listenToFirestore: () => {
            const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'locations');
            onSnapshot(colRef, (snapshot) => {
                locations = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                logic.updateMapMarkers(); 
                logic.updateUILists(); 
            });
        },

        createMarker: (loc) => {
            const typeLabelMap = { 'phong-hoc': 'Phòng học', 'vp-khoa': 'Văn phòng Khoa', 'hanh-chinh': 'Hành chính', 'phong-chuc-nang': 'Phòng chức năng', 'hieu-truong': 'Hiệu Trưởng', 'pho-hieu-truong': 'Phó Hiệu Trưởng' };
            const isBGH = ['hieu-truong', 'pho-hieu-truong'].includes(loc.type);
            const popupContent = `<div class="profile-popup p-1"><p class="text-[10px] font-bold text-blue-600 uppercase mb-1">${typeLabelMap[loc.type]}</p><p class="text-sm font-black mb-2">${loc.name}</p><button onclick="logic.selectLocation('${loc.id}')" class="w-full py-2 bg-blue-600 text-white text-[10px] font-bold rounded-lg uppercase">Xem dẫn đường</button></div>`;

            if (loc.type === 'phong-hoc') {
                return L.marker(loc.coords, { icon: L.divIcon({ className: 'custom-marker-icon', html: `<div class="room-dot bg-blue-500"></div>`, iconSize: [14, 14], iconAnchor: [7, 7] }) }).bindPopup(popupContent);
            } else {
                let mapLabel = isBGH ? (loc.head || loc.name) : loc.name;
                let boxClass = isBGH ? "box-rector" : "bg-blue-600";
                let labelClass = isBGH ? "label-rector" : "";
                let iconClass = isBGH ? "fa-user-tie" : "fa-building";

                return L.marker(loc.coords, { icon: L.divIcon({ className: 'custom-marker-icon', html: `<div class="marker-wrapper"><div class="marker-icon-box ${boxClass}"><i class="fas ${iconClass}"></i></div><div class="marker-label ${labelClass}">${mapLabel}</div></div>`, iconSize: [40, 65], iconAnchor: [20, 50] }) }).bindPopup(popupContent);
            }
        },

        updateMapMarkers: () => {
            locationMarkersGroup.clearLayers();
            if (isAdmin) {
                locations.forEach(loc => { locationMarkersGroup.addLayer(logic.createMarker(loc)); });
            }
        },

        updateUILists: () => {
            const select = document.getElementById('destination');
            const adminList = document.getElementById('admin-list');
            if (!select || !adminList) return;

            select.innerHTML = '<option value="">-- Bạn muốn đi đâu? --</option>';

            const floors = ["Trệt", "1", "2", "3", "4"];
            const areas = ["A", "B", "C", "D", "Khác"];

            // 1. BAN GIÁM HIỆU
            const bghList = locations.filter(l => ['hieu-truong', 'pho-hieu-truong'].includes(l.type));
            if (bghList.length > 0) {
                const group = document.createElement('optgroup');
                group.label = "🏢 BAN GIÁM HIỆU";
                bghList.forEach(loc => {
                    const opt = document.createElement('option'); opt.value = loc.id; opt.textContent = loc.name;
                    group.appendChild(opt);
                });
                select.appendChild(group);
            }

            // 2. KHỐI HÀNH CHÍNH (Chia theo lầu)
            floors.forEach(f => {
                const hcList = locations.filter(l => ['hanh-chinh', 'vp-khoa', 'phong-chuc-nang'].includes(l.type) && l.floor === f);
                if (hcList.length > 0) {
                    const group = document.createElement('optgroup');
                    group.label = `📂 KHỐI HÀNH CHÍNH - ${f === 'Trệt' ? 'TRỆT' : 'LẦU ' + f}`;
                    hcList.sort((a,b) => a.name.localeCompare(b.name)).forEach(loc => {
                        const opt = document.createElement('option'); opt.value = loc.id; opt.textContent = loc.name;
                        group.appendChild(opt);
                    });
                    select.appendChild(group);
                }
            });

            // 3. DÃY PHÒNG HỌC (Chia theo Khu & Lầu)
            areas.forEach(a => {
                floors.forEach(f => {
                    const roomList = locations.filter(l => l.type === 'phong-hoc' && l.area === a && l.floor === f);
                    if (roomList.length > 0) {
                        const group = document.createElement('optgroup');
                        group.label = `📖 PHÒNG HỌC KHU ${a} - ${f === 'Trệt' ? 'TRỆT' : 'LẦU ' + f}`;
                        roomList.sort((a,b) => a.name.localeCompare(b.name, undefined, {numeric: true})).forEach(loc => {
                            const opt = document.createElement('option'); opt.value = loc.id; opt.textContent = loc.name;
                            group.appendChild(opt);
                        });
                        select.appendChild(group);
                    }
                });
            });

            // Admin Management List
            adminList.innerHTML = '';
            locations.sort((a,b) => b.updatedAt - a.updatedAt).forEach(loc => {
                const div = document.createElement('div');
                div.className = "flex justify-between items-center p-4 bg-white rounded-2xl border shadow-sm";
                div.innerHTML = `<p class="font-bold text-sm">K${loc.area}-T${loc.floor}-${loc.name}</p><div class="flex gap-2"><button onclick="logic.edit('${loc.id}')" class="text-blue-600 px-2"><i class="fas fa-edit"></i></button><button onclick="logic.delete('${loc.id}')" class="text-red-600 px-2"><i class="fas fa-trash"></i></button></div>`;
                adminList.appendChild(div);
            });
        },

        selectLocation: (id) => {
            if (window.speechSynthesis.speaking) window.speechSynthesis.cancel();
            
            if (!id) {
                if (!isAdmin) locationMarkersGroup.clearLayers();
                if (routingControl) { map.removeControl(routingControl); routingControl = null; }
                document.getElementById('welcome-panel')?.classList.remove('hidden');
                document.getElementById('navigation-panel')?.classList.add('hidden');
                logic.recenter();
                return;
            }

            const loc = locations.find(l => l.id === id);
            if (!loc) return;
            if (!isAdmin) {
                locationMarkersGroup.clearLayers();
                const marker = logic.createMarker(loc);
                locationMarkersGroup.addLayer(marker);
                marker.openPopup();
            }
            logic.updateSidebarInfo(loc);
        },

        updateSidebarInfo: (loc) => {
            document.getElementById('welcome-panel')?.classList.add('hidden');
            document.getElementById('navigation-panel')?.classList.remove('hidden');
            
            const badgeMap = { 'phong-hoc': 'badge-classroom', 'vp-khoa': 'badge-faculty', 'hanh-chinh': 'badge-admin', 'phong-chuc-nang': 'badge-func', 'hieu-truong': 'badge-rector', 'pho-hieu-truong': 'badge-rector' };
            const typeLabelMap = { 'phong-hoc': 'Phòng học', 'vp-khoa': 'Văn phòng Khoa', 'hanh-chinh': 'Hành chính', 'phong-chuc-nang': 'Phòng chức năng', 'hieu-truong': 'Hiệu Trưởng', 'pho-hieu-truong': 'Phó Hiệu Trưởng' };
            
            const floorText = loc.floor === 'Trệt' ? 'Trệt' : 'Lầu ' + loc.floor;
            document.getElementById('room-type-info').innerHTML = `<span class="px-3 py-1 rounded-full text-[10px] font-black uppercase ${badgeMap[loc.type]}">${typeLabelMap[loc.type]}</span><span class="px-3 py-1 rounded-full text-[10px] font-black uppercase bg-slate-100">Khu ${loc.area} - ${floorText}</span>`;

            const card = document.getElementById('office-contact-card');
            if (loc.type !== 'phong-hoc') {
                card.classList.remove('hidden');
                safeSetText('head-name', loc.head || "Chưa cập nhật");
                const dep = document.getElementById('deputy-container');
                if (loc.deputy) { dep.classList.remove('hidden'); safeSetText('deputy-name', loc.deputy); } else { dep.classList.add('hidden'); }
            } else { card.classList.add('hidden'); }

            const gallery = document.getElementById('image-gallery');
            const galleryCont = document.getElementById('image-gallery-container');
            gallery.innerHTML = '';
            (loc.images || []).forEach(url => {
                const img = document.createElement('img'); img.src = logic.formatImageLink(url);
                img.onerror = () => img.style.display = 'none'; gallery.appendChild(img);
            });
            galleryCont.classList.toggle('hidden', (loc.images || []).length === 0);

            const stepsContainer = document.getElementById('step-list');
            stepsContainer.innerHTML = '';
            const stepsArray = (loc.note || "").split(/[\n;]+/).map(s => s.trim()).filter(s => s);
            
            stepsArray.forEach(t => {
                const d = document.createElement('div');
                d.className = "flex gap-4 items-center bg-slate-50 p-4 rounded-2xl border transition-all hover:border-blue-200";
                d.innerHTML = `<div class="w-8 h-8 rounded-lg bg-white flex items-center justify-center shrink-0 shadow-sm text-blue-600"><i class="fas fa-chevron-right text-xs"></i></div><p class="text-sm font-bold text-slate-700">${t}</p>`;
                stepsContainer.appendChild(d);
            });

            if (routingControl) map.removeControl(routingControl);
            routingControl = L.Routing.control({
                waypoints: [L.latLng(schoolGate[0], schoolGate[1]), L.latLng(loc.coords[0], loc.coords[1])],
                lineOptions: { styles: [{ color: '#2563eb', opacity: 0.8, weight: 6 }] },
                createMarker: () => null, show: false
            }).addTo(map);
            
            routingControl.on('routesfound', (e) => {
                safeSetText('distance-val', Math.round(e.routes[0].summary.totalDistance) + ' m');
                map.flyTo(loc.coords, 21);
                
                setTimeout(() => {
                    let speechText = `Hướng dẫn di chuyển đến ${loc.name}. `;
                    if (stepsArray.length > 0) {
                        stepsArray.forEach((s, i) => speechText += `${s}. `);
                    } else {
                        speechText += "Hãy đi theo đường kẻ màu xanh trên bản đồ để tới đích.";
                    }
                    logic.toggleVoice(speechText);
                }, 1000);
            });

            document.getElementById('open-google-maps').href = `https://www.google.com/maps/dir/?api=1&origin=${schoolGate[0]},${schoolGate[1]}&destination=${loc.coords[0]},${loc.coords[1]}&travelmode=walking`;
        },

        handleSaveLocation: async (e) => {
            e.preventDefault();
            const id = document.getElementById('form-id').value || crypto.randomUUID();
            const data = {
                name: document.getElementById('form-name').value, area: document.getElementById('form-area').value, floor: document.getElementById('form-floor').value, type: document.getElementById('form-type').value,
                coords: [parseFloat(document.getElementById('form-lat').value), parseFloat(document.getElementById('form-lng').value)],
                head: document.getElementById('form-head').value, deputy: document.getElementById('form-deputy').value, note: document.getElementById('form-note').value,
                images: document.getElementById('form-images').value.split(',').map(s => s.trim()).filter(s => s), updatedAt: Date.now()
            };
            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'locations', id), data);
            logic.resetForm(); alert("Đã lưu thành công!");
        },

        resetForm: () => { document.getElementById('location-form').reset(); document.getElementById('form-id').value = ''; },
        edit: (id) => {
            const loc = locations.find(l => l.id === id); if (!loc) return;
            const fields = ['id', 'name', 'area', 'floor', 'type', 'head', 'deputy', 'note'];
            fields.forEach(f => document.getElementById(`form-${f}`).value = loc[f] || '');
            document.getElementById('form-lat').value = loc.coords[0];
            document.getElementById('form-lng').value = loc.coords[1];
            document.getElementById('form-images').value = (loc.images || []).join(', ');
        },
        delete: async (id) => { if(confirm("Xóa vĩnh viễn?")) await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'locations', id)); }
    };

    window.onload = logic.init;
</script>

</body>
